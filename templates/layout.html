<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask IDGS | Full Color</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
</head>

<body class="bg-gradient-to-br from-[#cbd5e1] via-[#94a3b8] to-[#64748b] min-h-screen font-sans antialiased text-slate-900">

    <nav class="bg-white/30 backdrop-blur-md border-b border-white/20 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex justify-between items-center">
            
            <a href="#" class="flex items-center gap-3">
                <div class="bg-white/80 p-1.5 rounded-lg shadow-sm">
                    <img src="{{url_for('static',filename='img/IDGS805.png')}}" class="h-7 w-auto" alt="Logo">
                </div>
                <span class="text-lg font-bold text-slate-800 tracking-tight italic">
                    FLASK-IDGS805
                </span>
            </a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-12 flex flex-col items-center">
        
        {% with messages=get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                <div id="alert-1" class="w-full max-w-md flex items-center p-4 mb-8 text-blue-900 bg-white/60 border border-white/40 backdrop-blur-sm rounded-2xl shadow-sm" role="alert">
                    <svg class="flex-shrink-0 w-4 h-4" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                      <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z"/>
                    </svg>
                    <div class="ms-3 text-sm font-bold tracking-tight">
                        {{ message }}
                    </div>
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="w-full max-w-md bg-white/70 backdrop-blur-sm rounded-[2.5rem] shadow-2xl border border-white/50 overflow-hidden">
            
            <div class="p-8 md:p-5">
                {% block container %}
                {% endblock %}
            </div>
        </div>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
</body>

</html>
