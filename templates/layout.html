<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flask IDGS</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f4f1eb] text-gray-800">

<!-- NAVBAR -->
<nav class="bg-[#faf8f5] border-b border-gray-300 shadow-sm sticky top-0 z-50">
<div class="max-w-7xl mx-auto flex justify-between items-center p-4">

<a href="#" class="flex items-center space-x-3">
<img src="{{url_for('static',filename='img/IDGS805.png')}}"
class="h-9 rounded-lg shadow-sm">

<span class="text-lg font-semibold text-gray-700">
Flask IDGS
</span>
</a>

<button class="bg-[#6b5b4a] hover:bg-[#5a4b3d] text-white px-5 py-2 rounded-lg text-sm shadow transition">
Get started
</button>

</div>
</nav>

<!-- CONTENIDO -->
<div class="flex items-center justify-center min-h-screen px-4 py-10">

<div class="w-full max-w-4xl bg-white rounded-2xl shadow-lg border border-gray-300 p-8">

<!-- FLASH MESSAGES -->
{% with messages=get_flashed_messages() %}
{% if messages %}
{% for message in messages %}
<div class="mb-4 p-4 rounded-lg bg-gray-200 border border-gray-300 text-gray-800 text-sm">
{{ message }}
</div>
{% endfor %}
{% endif %}
{% endwith %}

{% block container %}
{% endblock %}

</div>
</div>

</body>
</html>
